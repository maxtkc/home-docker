gzip on;
gzip_types text/html text/css application/javascript application/json image/svg+xml;
gzip_min_length 1024;

server {
    listen 80;

    location /errors/ {
        root /etc/nginx;
    }

    # Long cache for fingerprinted/versioned static assets
    location ~* \.(css|js|woff2|woff|ttf|webp|png|jpg|jpeg|gif|ico|svg|json)$ {
        root /sites/$host;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Short cache for HTML (content can change)
    location / {
        root /sites/$host;
        try_files $uri $uri/ /index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }
}
